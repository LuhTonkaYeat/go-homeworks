syntax = "proto3";

package repository;

option go_package = "github.com/LuhTonkaYeat/GoHomeworks/hw2/api/proto";

service CollectorService {
    rpc GetRepository(RepoRequest) returns (RepoResponse) {}
}

message RepoRequest {
    string owner = 1;
    string repo = 2;
}

message RepoResponse {
    string name = 1;
    string description = 2;
    int32 stars = 3;
    int32 forks = 4;
    string created_at = 5;
}