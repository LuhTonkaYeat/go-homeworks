basePath: /
definitions:
  http.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  http.RepositoryResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      forks:
        type: integer
      name:
        type: string
      stars:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: API for getting information about GitHub repositories
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: GitHub Repository API
  version: "1.0"
paths:
  /repo:
    get:
      consumes:
      - application/json
      description: Get information about a GitHub repository by owner and repo name
      parameters:
      - description: Repository owner (username or organization)
        in: query
        name: owner
        required: true
        type: string
      - description: Repository name
        in: query
        name: repo
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved repository information
          schema:
            $ref: '#/definitions/http.RepositoryResponse'
        "400":
          description: Bad request - missing parameters
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Repository not found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get repository information
      tags:
      - repositories
schemes:
- http
swagger: "2.0"
