basePath: /
definitions:
  http.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  http.PingResponse:
    properties:
      services:
        items:
          $ref: '#/definitions/http.ServiceStatus'
        type: array
      status:
        type: string
    type: object
  http.RepositoryResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      forks:
        type: integer
      full_name:
        type: string
      stars:
        type: integer
    type: object
  http.ServiceStatus:
    properties:
      name:
        type: string
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for getting information about GitHub repositories
  title: GitHub Repository API
  version: "2.0"
paths:
  /api/ping:
    get:
      consumes:
      - application/json
      description: Ping processor and subscriber services
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.PingResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/http.PingResponse'
      summary: Check services status
      tags:
      - health
  /api/repositories/info:
    get:
      consumes:
      - application/json
      description: Get information about a GitHub repository by URL
      parameters:
      - description: GitHub repository URL (e.g., https://github.com/golang/go)
        in: query
        name: url
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.RepositoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get repository information
      tags:
      - repositories
swagger: "2.0"
